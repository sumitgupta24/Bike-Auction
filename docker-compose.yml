services:
  mongo:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db

  mongo-setup:
    image: mongo:7
    depends_on:
      - mongo
    restart: "no"
    command: >
      bash -c "
        sleep 5;
        mongosh --host mongo:27017 --eval 'rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongo:27017\"}]})' || true;
      "

  backend:
    image: node:20
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "5001:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/bike-auction?replicaSet=rs0
      - JWT_SECRET=supersecretjwtkey123
      - PORT=5000
    command: sh -c "npm install && node src/index.js"
    depends_on:
      mongo-setup:
        condition: service_completed_successfully

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5174:5173"
    environment:
      - VITE_API_URL=http://localhost:5001/api
    command: sh -c "npm install --legacy-peer-deps && npm run dev -- --host"
    depends_on:
      - backend

  mongo-express:
    image: mongo-express
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017/?replicaSet=rs0
    depends_on:
      mongo-setup:
        condition: service_completed_successfully

volumes:
  mongo_data:
